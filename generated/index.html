<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #F5F5F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .hero-form {
            width: 375px;
            min-height: 960px;
            background-color: #F5F5F5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 160px 40px 40px 40px;
            gap: 56px;
        }

        .text-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .title {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 48px;
            line-height: 57.6px;
            letter-spacing: -0.96px;
            color: #2C2C2C;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 32px;
            line-height: 38.4px;
            color: #2C2C2C;
        }

        .form-contact {
            width: 279px;
            background-color: #FFFFFF;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 22.4px;
            color: #1E1E1E;
        }

        .input-container {
            background-color: #FFFFFF;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
        }

        .input-value {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 16px;
            color: #B3B3B3;
            border: none;
            outline: none;
            background: transparent;
        }

        .input-value::placeholder {
            color: #B3B3B3;
        }

        .textarea-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .textarea-container {
            background-color: #FFFFFF;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            padding: 12px 16px;
            min-height: 80px;
            position: relative;
        }

        .textarea-value {
            width: 100%;
            height: 56px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 22.4px;
            color: #B3B3B3;
            border: none;
            outline: none;
            background: transparent;
            resize: none;
        }

        .textarea-value::placeholder {
            color: #B3B3B3;
        }

        .drag-icon {
            position: absolute;
            bottom: 12px;
            right: 16px;
            width: 6.63px;
            height: 6.63px;
            opacity: 0.7;
        }

        .drag-icon::before,
        .drag-icon::after {
            content: '';
            position: absolute;
            width: 6.17px;
            height: 1px;
            background-color: #B3B3B3;
            border-radius: 0.5px;
        }

        .drag-icon::before {
            top: 0;
            transform: rotate(45deg);
        }

        .drag-icon::after {
            top: 3.54px;
            left: 3.54px;
            width: 3.09px;
            transform: rotate(45deg);
        }

        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
        }

        .submit-button {
            background-color: #2C2C2C;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .submit-button:hover {
            background-color: #1A1A1A;
        }

        .button-text {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 16px;
            color: #FFFFFF;
        }

        /* Focus states */
        .input-container:focus-within,
        .textarea-container:focus-within {
            border-color: #2C2C2C;
        }

        .input-value:focus,
        .textarea-value:focus {
            color: #2C2C2C;
        }
    </style>
</head>
<body>
    <div class="hero-form">
        <div class="text-content">
            <h1 class="title">Title</h1>
            <p class="subtitle">Subtitle</p>
        </div>

        <div class="form-contact">
            <div class="input-field">
                <label class="input-label">Name</label>
                <div class="input-container">
                    <input type="text" class="input-value" placeholder="Value">
                </div>
            </div>

            <div class="input-field">
                <label class="input-label">Surname</label>
                <div class="input-container">
                    <input type="text" class="input-value" placeholder="Value">
                </div>
            </div>

            <div class="input-field">
                <label class="input-label">Email</label>
                <div class="input-container">
                    <input type="email" class="input-value" placeholder="Value">
                </div>
            </div>

            <div class="textarea-field">
                <label class="input-label">Message</label>
                <div class="textarea-container">
                    <textarea class="textarea-value" placeholder="Value"></textarea>
                    <div class="drag-icon"></div>
                </div>
            </div>

            <div class="button-group">
                <button class="submit-button" type="submit">
                    <span class="button-text">Submit</span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
