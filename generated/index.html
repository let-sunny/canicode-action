<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .hero-form {
            display: flex;
            flex-direction: column;
            gap: 32px;
            justify-content: center;
            align-items: center;
            padding: 160px 24px 160px 24px;
            width: 375px;
            height: 960px;
            background: #F5F5F5;
        }

        .text-content-title {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: 117px;
            height: 104px;
        }

        .title {
            width: 117px;
            height: 58px;
            font-family: "Inter";
            font-weight: 700;
            font-size: 48px;
            line-height: 57.60000228881836px;
            letter-spacing: -0.96px;
            color: #2C2C2C;
        }

        .subtitle {
            width: 117px;
            height: 38px;
            font-family: "Inter";
            font-weight: 400;
            font-size: 32px;
            line-height: 38.400001525878906px;
            color: #2C2C2C;
        }

        .form-contact {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 24px 24px 24px 24px;
            width: 327px;
            height: 504px;
            background: #FFFFFF;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 279px;
            height: 70px;
        }

        .textarea-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 279px;
            height: 110px;
        }

        .label {
            width: 279px;
            height: 22px;
            font-family: "Inter";
            font-weight: 400;
            font-size: 16px;
            line-height: 22.399999618530273px;
            color: #1E1E1E;
        }

        .input {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 12px 16px 12px 16px;
            width: 279px;
            height: 40px;
            background: #FFFFFF;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
        }

        .textarea {
            display: flex;
            flex-direction: row;
            padding: 12px 16px 12px 16px;
            width: 279px;
            height: 80px;
            background: #FFFFFF;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            position: relative;
        }

        .value {
            width: 247px;
            font-family: "Inter";
            font-weight: 400;
            font-size: 16px;
            color: #B3B3B3;
        }

        .value-input {
            height: 16px;
            line-height: 16px;
        }

        .value-textarea {
            height: 22px;
            line-height: 22.399999618530273px;
        }

        .drag {
            width: 7px;
            height: 7px;
            border: 1px solid #B3B3B3;
            position: absolute;
            bottom: 8px;
            right: 8px;
        }

        .button-group {
            display: flex;
            flex-direction: row;
            gap: 16px;
            align-items: center;
            width: 279px;
            height: 40px;
        }

        .button {
            display: flex;
            flex-direction: row;
            gap: 8px;
            justify-content: center;
            align-items: center;
            padding: 12px 12px 12px 12px;
            width: 279px;
            height: 40px;
            background: #2C2C2C;
            border: 1px solid #2C2C2C;
            border-radius: 8px;
        }

        .button-text {
            font-family: "Inter";
            font-weight: 400;
            font-size: 16px;
            line-height: 16px;
            color: #F5F5F5;
        }
    </style>
</head>
<body>
    <div class="hero-form">
        <div class="text-content-title">
            <div class="title">Title</div>
            <div class="subtitle">Subtitle</div>
        </div>
        <div class="form-contact">
            <div class="input-field">
                <div class="label">Name</div>
                <div class="input">
                    <div class="value value-input">Value</div>
                </div>
            </div>
            <div class="input-field">
                <div class="label">Surname</div>
                <div class="input">
                    <div class="value value-input">Value</div>
                </div>
            </div>
            <div class="input-field">
                <div class="label">Email</div>
                <div class="input">
                    <div class="value value-input">Value</div>
                </div>
            </div>
            <div class="textarea-field">
                <div class="label">Message</div>
                <div class="textarea">
                    <div class="value value-textarea">Value</div>
                    <div class="drag"></div>
                </div>
            </div>
            <div class="button-group">
                <div class="button">
                    <div class="button-text">Submit</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
