<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Form</title>
    <style>
        :root {
            --color-bg: rgb(245, 245, 245);
            --color-white: rgb(255, 255, 255);
            --color-border: rgb(217, 217, 217);
            --color-text-primary: rgb(44, 44, 44);
            --color-text-secondary: rgb(30, 30, 30);
            --color-text-placeholder: rgb(179, 179, 179);
            --color-button: rgb(44, 44, 44);
            --color-button-text: rgb(255, 255, 255);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
        }

        .hero-form {
            width: 375px;
            height: 960px;
            background-color: var(--color-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 160px 24px;
        }

        .text-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .title {
            font-family: Inter;
            font-weight: 700;
            font-size: 48px;
            line-height: 120%;
            letter-spacing: -0.96px;
            text-align: center;
            color: var(--color-text-secondary);
        }

        .subtitle {
            font-family: Inter;
            font-weight: 400;
            font-size: 32px;
            line-height: 120%;
            text-align: center;
            color: var(--color-text-secondary);
        }

        .form-container {
            width: 327px;
            background-color: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-label {
            font-family: Inter;
            font-weight: 400;
            font-size: 16px;
            line-height: 140%;
            color: var(--color-text-secondary);
        }

        .field-input, .field-textarea {
            background-color: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: Inter;
            font-weight: 400;
            font-size: 16px;
            color: var(--color-text-placeholder);
        }

        .field-input {
            height: 40px;
            line-height: 100%;
        }

        .field-textarea {
            height: 80px;
            line-height: 140%;
            resize: none;
            position: relative;
        }

        .submit-button {
            background-color: var(--color-button);
            color: var(--color-button-text);
            border: none;
            border-radius: 8px;
            padding: 12px;
            height: 40px;
            font-family: Inter;
            font-weight: 400;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="hero-form">
        <div class="text-content">
            <h1 class="title">Title</h1>
            <p class="subtitle">Subtitle</p>
        </div>
        
        <form class="form-container">
            <div class="field-group">
                <label class="field-label">Name</label>
                <input type="text" class="field-input" placeholder="Value">
            </div>
            
            <div class="field-group">
                <label class="field-label">Surname</label>
                <input type="text" class="field-input" placeholder="Value">
            </div>
            
            <div class="field-group">
                <label class="field-label">Email</label>
                <input type="email" class="field-input" placeholder="Value">
            </div>
            
            <div class="field-group">
                <label class="field-label">Message</label>
                <textarea class="field-textarea" placeholder="Value"></textarea>
            </div>
            
            <button type="submit" class="submit-button">Submit</button>
        </form>
    </div>
</body>
</html>
