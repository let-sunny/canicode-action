name: 'CanICode Action'
description: 'Figma design quality gate for CI. Analyze designs and enforce score thresholds before merging.'
author: 'let-sunny'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  figma_url:
    description: 'Figma URL with node-id (e.g., https://www.figma.com/design/ABC/File?node-id=1-234)'
    required: true
  figma_token:
    description: 'Figma API token (Personal Access Token with file read access)'
    required: true
  min_score:
    description: 'Minimum score to pass (0-100). Fails the check if below this threshold.'
    required: false
    default: '60'
  preset:
    description: 'Analysis preset: relaxed | dev-friendly | ai-ready | strict'
    required: false
    default: 'dev-friendly'
  comment:
    description: 'Post analysis results as a PR comment (true/false)'
    required: false
    default: 'true'
  version:
    description: 'canicode CLI version to use (e.g., 0.8.4, latest)'
    required: false
    default: 'latest'
  fail_on_error:
    description: 'Fail the action if analysis encounters an error (true/false)'
    required: false
    default: 'true'

outputs:
  score:
    description: 'Overall score percentage (0-100)'
    value: ${{ steps.analyze.outputs.score }}
  grade:
    description: 'Overall grade (A/B/C/D/F)'
    value: ${{ steps.analyze.outputs.grade }}
  passed:
    description: 'Whether the score met the minimum threshold (true/false)'
    value: ${{ steps.analyze.outputs.passed }}
  report_json:
    description: 'Full analysis result as JSON'
    value: ${{ steps.analyze.outputs.report_json }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Check dependencies
      shell: bash
      run: |
        for cmd in jq sed; do
          if ! command -v "$cmd" &>/dev/null; then
            echo "::error::Required dependency '$cmd' not found"
            exit 1
          fi
        done

    - name: Install canicode
      shell: bash
      env:
        CANICODE_VERSION: ${{ inputs.version }}
      run: npm install -g "canicode@$CANICODE_VERSION"

    - name: Save fixture from Figma
      id: fixture
      shell: bash
      env:
        FIGMA_TOKEN: ${{ inputs.figma_token }}
        FIGMA_URL: ${{ inputs.figma_url }}
      run: |
        if ! canicode save-fixture "$FIGMA_URL" \
          --output /tmp/canicode-fixture.json \
          --token "$FIGMA_TOKEN"; then
          echo "::error::Failed to fetch Figma design. Check that the URL is correct and the file is publicly accessible."
          if [ "${{ inputs.fail_on_error }}" = "true" ]; then
            exit 1
          fi
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

    - name: Run analysis
      id: analyze
      if: ${{ steps.fixture.outputs.skipped != 'true' }}
      shell: bash
      env:
        INPUT_PRESET: ${{ inputs.preset }}
        INPUT_MIN_SCORE: ${{ inputs.min_score }}
      run: |
        # Run analysis and extract JSON
        RAW=$(canicode analyze /tmp/canicode-fixture.json \
          --preset "$INPUT_PRESET" \
          --json 2>&1)
        RESULT=$(echo "$RAW" | sed -n '/^{/,/^}/p')

        # Validate JSON
        if ! echo "$RESULT" | jq empty 2>/dev/null; then
          echo "::error::Analysis produced invalid JSON output"
          if [ "${{ inputs.fail_on_error }}" = "true" ]; then
            exit 1
          fi
          exit 0
        fi

        # Extract fields
        SCORE=$(echo "$RESULT" | jq -r '.scores.overall.percentage')
        GRADE=$(echo "$RESULT" | jq -r '.scores.overall.grade')
        NODES=$(echo "$RESULT" | jq -r '.nodeCount')
        ISSUES=$(echo "$RESULT" | jq -r '.issueCount')
        SUMMARY=$(echo "$RESULT" | jq -r '.summary')
        BLOCKING=$(echo "$SUMMARY" | sed -n 's/.*Blocking: \([0-9]*\).*/\1/p')
        RISK=$(echo "$SUMMARY" | sed -n 's/.*Risk: \([0-9]*\).*/\1/p')
        BLOCKING=${BLOCKING:-0}
        RISK=${RISK:-0}

        # Category table
        CATEGORIES=$(echo "$RESULT" | jq -r '.scores.categories | to_entries | map("| \(.key) | \(.value.percentage)% |") | .[]')

        # Pass/fail
        if [ "$SCORE" -ge "$INPUT_MIN_SCORE" ]; then
          PASSED=true
          STATUS="PASSED"
        else
          PASSED=false
          STATUS="FAILED"
        fi

        # Set outputs
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
        echo "nodes=$NODES" >> "$GITHUB_OUTPUT"
        echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"
        echo "blocking=$BLOCKING" >> "$GITHUB_OUTPUT"
        echo "risk=$RISK" >> "$GITHUB_OUTPUT"
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"

        {
          echo "categories<<ENDCAT"
          echo "$CATEGORIES"
          echo "ENDCAT"
        } >> "$GITHUB_OUTPUT"

        {
          echo "report_json<<ENDJSON"
          echo "$RESULT"
          echo "ENDJSON"
        } >> "$GITHUB_OUTPUT"

    - name: Post PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' && steps.analyze.outputs.score != '' }}
      uses: actions/github-script@v7
      with:
        script: |
          const score = '${{ steps.analyze.outputs.score }}';
          const grade = '${{ steps.analyze.outputs.grade }}';
          const nodes = '${{ steps.analyze.outputs.nodes }}';
          const issues = '${{ steps.analyze.outputs.issues }}';
          const blocking = '${{ steps.analyze.outputs.blocking }}';
          const risk = '${{ steps.analyze.outputs.risk }}';
          const status = '${{ steps.analyze.outputs.status }}';
          const emoji = status === 'PASSED' ? 'âś…' : 'âťŚ';
          const minScore = '${{ inputs.min_score }}';
          const categories = `${{ steps.analyze.outputs.categories }}`;
          const figmaUrl = process.env.FIGMA_URL;

          const body = [
            `## ${emoji} CanICode Design Analysis â€” ${status}`,
            '',
            '| Metric | Value |',
            '|--------|-------|',
            `| Score | **${score}%** (${grade}) |`,
            `| Threshold | ${minScore}% |`,
            `| Nodes | ${nodes} |`,
            `| Issues | ${issues} (blocking: ${blocking}, risk: ${risk}) |`,
            '',
            '### Category Scores',
            '| Category | Score |',
            '|----------|-------|',
            categories,
            '',
            '---',
            `[View in Figma](${figmaUrl}) | Powered by [CanICode](https://github.com/let-sunny/canicode)`,
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c =>
            c.user?.type === 'Bot' && c.body?.includes('CanICode Design Analysis')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              ...context.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
          }
      env:
        FIGMA_URL: ${{ inputs.figma_url }}

    - name: Check score threshold
      if: ${{ steps.analyze.outputs.passed == 'false' }}
      shell: bash
      run: |
        echo "::error::Design score ${{ steps.analyze.outputs.score }}% is below minimum threshold ${{ inputs.min_score }}%"
        exit 1
